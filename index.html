<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rina Training Club</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <img src="logo/logo.png" alt="Rina Training Club" />
    </div>

    <form class="auth-form" id="loginForm">
      <h2>Entrar</h2>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <div id="loginError" class="error-msg hidden"></div>

      <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>

      <p style="text-align:center; font-size:0.85rem; color: var(--white-muted)">
        Não tem conta? <a href="pages/cadastro.html" class="auth-link">Criar conta</a>
      </p>
    </form>

    <p class="auth-footer">Rina Training Club &copy; 2025</p>
  </div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
