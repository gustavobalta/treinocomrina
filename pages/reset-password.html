<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rina Training Club — Definir senha</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <img src="../logo/logo.png" alt="Rina Training Club" />
    </div>

    <form class="auth-form" id="resetForm">
      <h2>Definir senha</h2>
      <p style="font-size:0.85rem; color:var(--white-muted)">Escolha uma senha para acessar sua conta.</p>

      <div class="form-group">
        <label for="newPassword">Nova senha</label>
        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar senha</label>
        <input type="password" id="confirmPassword" placeholder="Repita a senha" required minlength="6" />
      </div>

      <div id="resetError" class="error-msg hidden"></div>
      <div id="resetSuccess" class="success-msg hidden"></div>

      <button type="submit" class="btn-primary" id="resetBtn">Salvar senha</button>
    </form>

    <p class="auth-footer">Rina Training Club &copy; 2025</p>
  </div>

  <script type="module">
    import { supabase } from "../js/supabase.js";

    const form = document.getElementById("resetForm");
    const errorDiv = document.getElementById("resetError");
    const successDiv = document.getElementById("resetSuccess");
    const btn = document.getElementById("resetBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorDiv.classList.add("hidden");
      successDiv.classList.add("hidden");

      const password = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (password !== confirm) {
        errorDiv.textContent = "As senhas não coincidem.";
        errorDiv.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Salvando...";

      // Define a senha
      const { data: updateData, error: updateErr } = await supabase.auth.updateUser({ password });
      if (updateErr) {
        errorDiv.textContent = "Erro ao salvar senha. O link pode ter expirado.";
        errorDiv.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Salvar senha";
        return;
      }

      const uid = updateData.user.id;
      const email = updateData.user.email;

      // Busca dados pendentes e cria perfil
      const { data: pending } = await supabase
        .from("pending_users")
        .select("*")
        .eq("email", email)
        .single();

      const perfil = {
        id: uid,
        email,
        role: "aluno",
        bloqueado: false,
        nome: pending?.nome || "",
        nascimento: pending?.nascimento || null,
        cpf: pending?.cpf || "",
        rg: pending?.rg || "",
        telefone: pending?.telefone || "",
        rua: pending?.rua || "",
        numero: pending?.numero || "",
        bairro: pending?.bairro || "",
        cidade: pending?.cidade || "",
        estado: pending?.estado || "",
        cep: pending?.cep || "",
        inicio: pending?.inicio || null,
        obs: pending?.obs || "",
      };

      await supabase.from("users").upsert(perfil);

      // Remove da tabela pendente
      if (pending) {
        await supabase.from("pending_users").delete().eq("email", email);
      }

      successDiv.textContent = "Senha definida! Redirecionando...";
      successDiv.classList.remove("hidden");
      setTimeout(() => window.location.href = "./aluno.html", 2000);
    });
  </script>
</body>
</html>
