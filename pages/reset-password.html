<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rina Training Club — Definir senha</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <img src="../logo/logo.png" alt="Rina Training Club" />
    </div>

    <form class="auth-form" id="resetForm">
      <h2>Definir senha</h2>
      <p style="font-size:0.85rem; color:var(--white-muted)">Escolha uma senha para acessar sua conta.</p>

      <div class="form-group">
        <label for="newPassword">Nova senha</label>
        <input type="password" id="newPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar senha</label>
        <input type="password" id="confirmPassword" placeholder="Repita a senha" required minlength="6" />
      </div>

      <div id="resetError" class="error-msg hidden"></div>
      <div id="resetSuccess" class="success-msg hidden"></div>

      <button type="submit" class="btn-primary" id="resetBtn">Salvar senha</button>
    </form>

    <p class="auth-footer">Rina Training Club &copy; 2025</p>
  </div>

  <script type="module">
    import { supabase } from "../js/supabase.js";

    const form = document.getElementById("resetForm");
    const errorDiv = document.getElementById("resetError");
    const successDiv = document.getElementById("resetSuccess");
    const btn = document.getElementById("resetBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorDiv.classList.add("hidden");
      successDiv.classList.add("hidden");

      const password = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (password !== confirm) {
        errorDiv.textContent = "As senhas não coincidem.";
        errorDiv.classList.remove("hidden");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Salvando...";

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        errorDiv.textContent = "Erro ao salvar senha. Tente novamente.";
        errorDiv.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Salvar senha";
        return;
      }

      successDiv.textContent = "Senha definida! Redirecionando...";
      successDiv.classList.remove("hidden");
      setTimeout(() => window.location.href = "./aluno.html", 2000);
    });
  </script>
</body>
</html>
